<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจจับวัตถุกล้องหลังมือถือ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ตรวจจับวัตถุจากกล้อง</h1>
        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="overlay"></div>
            <div id="preview-container">
                <img id="preview" alt="ภาพตรวจจับ">
            </div>
        </div>
        <div class="controls">
            <button id="start-btn">เปิดกล้อง</button>
            <button id="capture-btn" disabled>ถ่ายภาพตรวจจับ</button>
            <button id="realtime-btn" disabled>เริ่มตรวจจับแบบเรียลไทม์</button>
            <button id="stop-btn" disabled>หยุดกล้อง</button>
        </div>
        <div id="result" class="result"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
